<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0a0e0c">
    <title>Mundial 2026 · Pronósticos en vivo</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Hanken+Grotesk:ital,wght@0,400;0,500;0,600;0,700;0,800;1,500&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=7">
</head>
<body>
    <div class="bg-grain" aria-hidden="true"></div>
    <div class="bg-glow" aria-hidden="true"></div>

    <header class="site-header">
        <div class="header-inner">
            <button class="brand" onclick="switchView('hoy')" aria-label="Inicio">
                <svg class="crest" viewBox="0 0 60 68" aria-hidden="true">
                    <defs>
                        <linearGradient id="sh" x1="0" y1="0" x2="0" y2="1">
                            <stop offset="0" stop-color="#1a4d30"/>
                            <stop offset="1" stop-color="#06180f"/>
                        </linearGradient>
                    </defs>
                    <path d="M30 2 56 11V35C56 51 44 62 30 66 16 62 4 51 4 35V11L30 2Z" fill="url(#sh)" stroke="#c6ff3a" stroke-width="2.6"/>
                    <circle cx="30" cy="32" r="13" fill="#0a0e0c"/>
                    <g stroke="#c6ff3a" stroke-width="1.6" stroke-linecap="round">
                        <line x1="30" y1="27" x2="30" y2="20"/>
                        <line x1="34.8" y1="30.5" x2="41.4" y2="28.3"/>
                        <line x1="32.9" y1="36" x2="37" y2="41.7"/>
                        <line x1="27.1" y1="36" x2="23" y2="41.7"/>
                        <line x1="25.2" y1="30.5" x2="18.6" y2="28.3"/>
                    </g>
                    <path d="M30 27 34.8 30.5 32.9 36 27.1 36 25.2 30.5Z" fill="#c6ff3a"/>
                </svg>
                <span class="brand-text">
                    <span class="brand-title">MUNDIAL <span>26</span></span>
                    <span class="brand-sub">La quiniela del asado</span>
                </span>
            </button>
            <div class="header-actions">
                <div id="session-slot" class="session-slot"><!-- render dinámico --></div>
                <button class="gear-btn" title="Admin" onclick="switchView('admin')" aria-label="Admin">⚙</button>
            </div>
        </div>
        <div id="ticker" class="ticker"><!-- render dinámico --></div>
    </header>

    <main id="content"><!-- render dinámico --></main>

    <nav class="tab-bar">
        <button class="tab-btn active" data-view="hoy" onclick="switchView('hoy')">
            <span class="tab-ico">🔴</span> <span class="tab-label">Hoy</span>
        </button>
        <button class="tab-btn" data-view="grupos" onclick="switchView('grupos')">
            <span class="tab-ico">📊</span> <span class="tab-label">Grupos</span>
        </button>
        <button class="tab-btn" data-view="live" onclick="switchView('live')">
            <span class="tab-ico">⚡</span> <span class="tab-label">Live</span>
        </button>
        <button class="tab-btn" data-view="ranking" onclick="switchView('ranking')">
            <span class="tab-ico">🏆</span> <span class="tab-label">Ranking</span>
        </button>
        <button class="tab-btn" data-view="mis" onclick="switchView('mis')">
            <span class="tab-ico">⚽</span> <span class="tab-label">Mis pron.</span>
        </button>
    </nav>

    <script src="app.js?v=7"></script>
</body>
</html>
