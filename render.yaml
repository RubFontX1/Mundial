# Despliegue en Render (https://render.com) como servicio web Docker.
#
# Pasos:
#   1) Sube este proyecto a un repo de GitHub.
#   2) En Render:  New +  →  Blueprint  →  conecta tu repo (Render lee este archivo).
#   3) En el dashboard del servicio define ADMIN_KEY (Environment) con tu clave secreta.
#   4) Deploy. Tu web quedará en https://<nombre>.onrender.com
#
# Plan FREE + base de datos PostgreSQL persistente en Supabase: los jugadores y
# pronósticos NO se pierden aunque el servicio se duerma o se redeploye. La
# cadena de conexión va en la variable DATABASE_URL (secreta, se define en el
# dashboard de Render). El fixture y los resultados se sincronizan solos desde
# worldcup26.ir.
services:
  - type: web
    name: prode-mundial-2026
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    region: oregon
    healthCheckPath: /api/matches
    envVars:
      - key: DATABASE_URL
        sync: false        # cadena de conexión de Supabase (secreta)
      - key: ADMIN_KEY
        sync: false        # clave de admin (secreta)
      - key: AUTO_SYNC
        value: "1"
      - key: WC_API_BASE
        value: https://worldcup26.ir
