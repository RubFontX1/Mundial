services:
  prode-app:
    build: .
    container_name: prode_mundial_2026
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      # Base de datos PostgreSQL (Supabase). Defínela en el host o en un .env:
      #   DATABASE_URL=postgresql://postgres.<ref>:<pass>@aws-1-<region>.pooler.supabase.com:6543/postgres
      - DATABASE_URL=${DATABASE_URL}
      - ADMIN_KEY=${ADMIN_KEY:-mundial2026}
      - AUTO_SYNC=${AUTO_SYNC:-1}
    restart: always
