services:
  prode-app:
    build: .
    container_name: prode_mundial_2026
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - prode_data:/app/db_volume
    environment:
      - PYTHONUNBUFFERED=1
      # La BD vive en el volumen persistente (fuera del bind-mount/OneDrive).
      - DB_PATH=/app/db_volume/prode.db
      # Opcionales: defínelas en el host o en un archivo .env
      - ADMIN_KEY=${ADMIN_KEY:-mundial2026}
      - AUTO_SYNC=${AUTO_SYNC:-1}
    restart: always

volumes:
  prode_data:
